name: Daily News Audio Generator

on:
  schedule:
    - cron: '0 22 * * *'  # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy requests

      - name: Generate audio
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV
          echo "开始生成音频，日期: $DATE"
          python scripts/generate-audio-with-music.py
          echo "检查音频文件:"
          ls -lh audio/${DATE}.mp3

      - name: Upload to WeChat Cloud Storage
        env:
          WX_APPID: ${{ secrets.WX_APPID }}
          WX_SECRET: ${{ secrets.WX_SECRET }}
          WX_ENV: ${{ secrets.WX_ENV }}
          DATE: ${{ env.DATE }}
        run: |
          echo "上传到微信小程序云存储..."
          python scripts/upload-to-wechat-cloud.py

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add audio/${{ env.DATE }}.mp3
          git diff --staged --quiet || git commit -m "Add audio for ${{ env.DATE }}"
          git push || echo "Push failed, but audio is already in cloud storage"
