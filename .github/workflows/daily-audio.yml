name: Daily News Audio Generator

on:
  schedule:
    - cron: '0 10 * * *'  # 北京时间 10:00
  workflow_dispatch:  # 支持手动触发

jobs:
  generate-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts moviepy

      - name: Generate audio with background music
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "DATE=$DATE" >> $GITHUB_ENV
          python scripts/generate-audio-with-music.py

      - name: Commit and push audio
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add audio/${{ env.DATE }}.mp3
          git diff --staged --quiet || git commit -m "Add audio for ${{ env.DATE }}"
          git push
